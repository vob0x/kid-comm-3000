<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#1a2450"/>
      <stop offset="70%" stop-color="#040814"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3a5c"/>
      <stop offset="100%" stop-color="#0f1a2e"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#001a22"/>
      <stop offset="100%" stop-color="#003040"/>
    </linearGradient>
    <filter id="gf">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Maskable: safe zone is center 80% (102..410). Fill full canvas. -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Signal waves -->
  <g opacity="0.25">
    <path d="M 330 135 Q 360 155 360 185" fill="none" stroke="#00e4ff" stroke-width="3" stroke-linecap="round"/>
    <path d="M 345 118 Q 385 145 385 185" fill="none" stroke="#00e4ff" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Antenna -->
  <rect x="218" y="80" width="8" height="80" rx="4" fill="#556688"/>
  <circle cx="222" cy="80" r="6" fill="#00e4ff" filter="url(#gf)" opacity="0.9"/>

  <!-- Body -->
  <rect x="180" y="152" width="152" height="240" rx="18" fill="url(#body)" stroke="#3a4f7a" stroke-width="2"/>

  <!-- Screen -->
  <rect x="200" y="175" width="112" height="64" rx="8" fill="url(#screen)" stroke="#00e4ff" stroke-width="1.5"/>
  <text x="256" y="218" font-size="36" text-anchor="middle" fill="#00e4ff" font-family="monospace" font-weight="bold" filter="url(#gf)">CH 01</text>

  <!-- Speaker grille -->
  <g opacity="0.45">
    <line x1="210" y1="260" x2="302" y2="260" stroke="#556688" stroke-width="1.5"/>
    <line x1="210" y1="270" x2="302" y2="270" stroke="#556688" stroke-width="1.5"/>
    <line x1="210" y1="280" x2="302" y2="280" stroke="#556688" stroke-width="1.5"/>
    <line x1="210" y1="290" x2="302" y2="290" stroke="#556688" stroke-width="1.5"/>
    <line x1="210" y1="300" x2="302" y2="300" stroke="#556688" stroke-width="1.5"/>
  </g>

  <!-- Talk button -->
  <rect x="220" y="318" width="72" height="30" rx="6" fill="#ff3b30" stroke="#ff6b60" stroke-width="1"/>
  <text x="256" y="339" font-size="14" text-anchor="middle" fill="#fff" font-family="Helvetica, sans-serif" font-weight="bold">TALK</text>

  <!-- Side button -->
  <rect x="170" y="200" width="11" height="40" rx="3" fill="#3a4f7a"/>

  <!-- LED -->
  <circle cx="256" cy="375" r="5" fill="#00ff66" filter="url(#gf)" opacity="0.8"/>
</svg>
