<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a2450"/>
      <stop offset="60%" stop-color="#040814"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3a5c"/>
      <stop offset="100%" stop-color="#0f1a2e"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#001a22"/>
      <stop offset="100%" stop-color="#003040"/>
    </linearGradient>
    <filter id="gf">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="192" height="192" rx="42" ry="42" fill="url(#bg)"/>

  <!-- Signal waves -->
  <g opacity="0.25">
    <path d="M 125 50 Q 145 62 145 78" fill="none" stroke="#00e4ff" stroke-width="2" stroke-linecap="round"/>
    <path d="M 132 40 Q 158 56 158 78" fill="none" stroke="#00e4ff" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Antenna -->
  <rect x="72" y="18" width="5" height="42" rx="2.5" fill="#556688"/>
  <circle cx="74.5" cy="18" r="4" fill="#00e4ff" filter="url(#gf)" opacity="0.9"/>

  <!-- Body -->
  <rect x="58" y="55" width="76" height="120" rx="10" fill="url(#body)" stroke="#3a4f7a" stroke-width="1.5"/>

  <!-- Screen -->
  <rect x="68" y="66" width="56" height="32" rx="5" fill="url(#screen)" stroke="#00e4ff" stroke-width="1"/>
  <text x="96" y="89" font-size="18" text-anchor="middle" fill="#00e4ff" font-family="monospace" font-weight="bold" filter="url(#gf)">CH 01</text>

  <!-- Speaker grille -->
  <g opacity="0.45">
    <line x1="74" y1="108" x2="118" y2="108" stroke="#556688" stroke-width="1.2"/>
    <line x1="74" y1="114" x2="118" y2="114" stroke="#556688" stroke-width="1.2"/>
    <line x1="74" y1="120" x2="118" y2="120" stroke="#556688" stroke-width="1.2"/>
    <line x1="74" y1="126" x2="118" y2="126" stroke="#556688" stroke-width="1.2"/>
  </g>

  <!-- Talk button -->
  <rect x="78" y="136" width="36" height="16" rx="4" fill="#ff3b30"/>
  <text x="96" y="149" font-size="8" text-anchor="middle" fill="#fff" font-family="Helvetica, sans-serif" font-weight="bold">TALK</text>

  <!-- Side button -->
  <rect x="53" y="82" width="6" height="22" rx="2" fill="#3a4f7a"/>

  <!-- LED -->
  <circle cx="96" cy="164" r="3" fill="#00ff66" filter="url(#gf)" opacity="0.8"/>
</svg>
